services:
  # ============================
  # MongoDB Database Service (Jenkins)
  # ============================
  mongo:
    image: mongo:7
    container_name: jewelry-mongo-jenkins
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo-data-jenkins:/data/db
    networks:
      - jewelry-net-jenkins

  # ============================
  # Next.js Application (Jenkins)
  # Uses volume-mounted code instead of Dockerfile
  # ============================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zuhanaveed/jewelry-store:jenkins
    container_name: jewelry-app-jenkins
    restart: always
    ports:
      - "3001:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/jewelry-store-jenkins
      - JWT_SECRET=mySuperSecretKey123!@#
      - ADMIN_EMAIL=admin@jewelry.com
      - ADMIN_PASSWORD=admin123
    depends_on:
      - mongo
    networks:
      - jewelry-net-jenkins

# ============================
# Persistent Volumes
# ============================
volumes:
  mongo-data-jenkins:
    driver: local

# ============================
# Custom Network
# ============================
networks:
  jewelry-net-jenkins:
    driver: bridge
